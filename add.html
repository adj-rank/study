<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>問題追加ツール</title>

<style>
body{font-family:sans-serif;padding:15px;margin:0;font-size:16px;}
h2{margin-top:0;}
.card{border:1px solid #ccc;border-radius:10px;padding:12px;margin:12px 0;}
label{font-weight:bold;display:block;margin-top:12px;}
input,textarea,select{
  width:100%;padding:10px;font-size:16px;margin-top:5px;
  box-sizing:border-box;border-radius:6px;border:1px solid #ccc;
}
textarea{min-height:100px;white-space:pre-wrap;}
button{
  width:100%;margin-top:12px;padding:12px;font-size:16px;
  border:none;border-radius:8px;background:#007bff;color:#fff;
}
button.gray{background:#6c757d;}
button.green{background:#8fd19e;color:#000;}
button.red{background:#dc3545;}
pre{background:#f4f4f4;padding:10px;white-space:pre-wrap;border-radius:8px;}
small{color:#555;line-height:1.5;}
.ok{color:green;font-weight:bold;}
.ng{color:#c00;font-weight:bold;}
</style>
</head>

<body>

<h2>問題追加ツール</h2>

<div class="card">
  <button class="gray" onclick="loadQuestions()">questions.json を読み込む</button>
  <div id="status"></div>
</div>

<div class="card">
  <h3>🔴 問題削除</h3>
  <label>削除する番号（1始まり）</label>
  <input id="deleteIndex" placeholder="例：3">
  <button class="red" onclick="deleteQuestion()">この番号を削除</button>
</div>

<div class="card">
  <h3>📥 更新後 questions.json</h3>
  <pre id="fullOut">（ここに出ます）</pre>
  <button class="gray" onclick="copyText()">コピー</button>
  <button onclick="downloadQuestions()">ダウンロード</button>
</div>

<script>
let loaded = null;

function setStatus(msg){
  document.getElementById("status").innerHTML = msg;
}

async function loadQuestions(){
  try{
    const res = await fetch("questions.json",{cache:"no-store"});
    const json = await res.json();
    if(!Array.isArray(json)) throw "配列ではありません";
    loaded = json;
    setStatus("<span class='ok'>読み込み成功（"+loaded.length+"問）</span>");
    document.getElementById("fullOut").textContent =
      JSON.stringify(loaded,null,2);
  }catch(e){
    setStatus("<span class='ng'>読み込み失敗</span>");
  }
}

function deleteQuestion(){
  if(!loaded){
    setStatus("<span class='ng'>先に読み込んでください</span>");
    return;
  }

  const idx = Number(document.getElementById("deleteIndex").value);

  if(!idx || idx < 1 || idx > loaded.length){
    setStatus("<span class='ng'>番号が不正です</span>");
    return;
  }

  loaded.splice(idx-1,1);

  setStatus("<span class='ok'>削除しました（現在 "+loaded.length+"問）</span>");
  document.getElementById("fullOut").textContent =
    JSON.stringify(loaded,null,2);
}

async function copyText(){
  await navigator.clipboard.writeText(
    document.getElementById("fullOut").textContent
  );
  setStatus("<span class='ok'>コピーしました</span>");
}

function downloadQuestions(){
  if(!loaded){
    setStatus("<span class='ng'>先に読み込んでください</span>");
    return;
  }
  const blob = new Blob(
    [JSON.stringify(loaded,null,2)],
    {type:"application/json"}
  );
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "questions.json";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
