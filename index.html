<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試験対策アプリ</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  margin: 0;
  font-size: 16px;
}

h1 {
  font-size: 20px;
  text-align: center;
}

#questionArea {
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 15px;
  white-space: pre-wrap;
}

button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background-color: #007bff;
  color: white;
}

button:active {
  opacity: 0.8;
}

select {
  width: 100%;
  padding: 8px;
  font-size: 14px;
  margin: 5px 0;
}

.correct {
  color: green;
  font-weight: bold;
}

.wrong {
  color: red;
  font-weight: bold;
}

.hidden {
  display: none;
}

</style>
</head>
<body>

<h1>試験対策アプリ</h1>

<!-- トップ画面（カテゴリ選択） -->
<div id="topScreen">
  <h3>カテゴリを選択してください</h3>
  <div id="categoryArea"></div>
</div>

<!-- 問題画面 -->
<div id="quizScreen" class="hidden">
  <div id="questionArea"></div>
  <div id="answersArea"></div>
  <div id="explanationArea"></div>
  <br>
  <button onclick="nextQuestion()">次の問題</button>
  <button onclick="goTop()">トップへ戻る</button>
</div>

<script>

let questions = [];
let filteredQuestions = [];
let currentIndex = 0;

fetch("questions.json")
  .then(response => response.json())
  .then(data => {
    questions = data;
    loadCategories();
  });

function loadCategories() {
  const categoryArea = document.getElementById("categoryArea");
  categoryArea.innerHTML = "";
  const categories = [...new Set(questions.map(q => q.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = () => startQuiz(cat);
    categoryArea.appendChild(btn);
  });
}

function startQuiz(category) {
  filteredQuestions = questions.filter(q => q.category === category);
  currentIndex = 0;

  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  showQuestion();
}

function goTop() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("topScreen").classList.remove("hidden");
}

function showQuestion() {

  if (filteredQuestions.length === 0) return;

  const q = filteredQuestions[currentIndex];

  const questionDiv = document.getElementById("questionArea");
  const answersDiv = document.getElementById("answersArea");
  const explanationDiv = document.getElementById("explanationArea");

  questionDiv.textContent = q.question;
  answersDiv.innerHTML = "";
  explanationDiv.innerHTML = "";

  if (q.type === "multi_blank") {

    let selectedAnswers = new Array(q.answers.length).fill(null);
    let resultSpans = [];

    q.answers.forEach((correctVal, index) => {

      const row = document.createElement("div");

      const label = document.createElement("div");
      label.textContent = "空欄" + (index+1);
      row.appendChild(label);

      const select = document.createElement("select");
      select.innerHTML =
        "<option value=''>選択してください</option>" +
        q.choices.map((choice, i) =>
          "<option value='" + i + "'>" + choice + "</option>"
        ).join("");

      select.onchange = function () {
        selectedAnswers[index] = parseInt(this.value);
      };

      row.appendChild(select);

      const resultSpan = document.createElement("div");
      row.appendChild(resultSpan);

      resultSpans.push(resultSpan);

      answersDiv.appendChild(row);
    });

    const checkBtn = document.createElement("button");
    checkBtn.textContent = "解答";
    checkBtn.onclick = function () {

      q.answers.forEach((correctVal, i) => {
        if (selectedAnswers[i] === correctVal) {
          resultSpans[i].textContent = "⭕ 正解";
          resultSpans[i].className = "correct";
        } else {
          resultSpans[i].textContent =
            "❌ 正解: " + q.choices[correctVal];
          resultSpans[i].className = "wrong";
        }
      });

      explanationDiv.textContent = q.explanation;
    };

    answersDiv.appendChild(checkBtn);
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= filteredQuestions.length) {
    currentIndex = 0;
  }
  showQuestion();
}

</script>

</body>
</html>
