<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>技術アジャスター試験問題</title>

<style>
body{
  font-family:sans-serif;
  padding:15px;
  margin:0;
  font-size:16px;
}

#topScreen h3{
  text-align:center;
  margin:0 0 16px 0;
}

#titleArea{
  font-size:16px;
  margin-bottom:8px;
}

#questionArea{
  font-size:16px;
  line-height:1.7;
  white-space:pre-wrap;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:15px;
  max-height:40vh;
  overflow-y:auto;
}

.answer-block{ margin-bottom:12px; }

.answer-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.answer-row label{ min-width:60px; }

select{
  flex:1;
  padding:10px;
  font-size:16px;
}

.answer-result{
  margin-left:60px;
  font-size:16px;
  line-height:1.6;
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
  background:#007bff;
  color:#fff;
}

#explainBtn{
  background:#8fd19e;
  color:#000;
}

.correct{ color:green; font-weight:bold; }
.wrong{ color:red; font-weight:bold; }
.hidden{ display:none; }
</style>
</head>

<body>

<!-- トップ画面 -->
<div id="topScreen">
  <h3>技術アジャスター試験問題</h3>
  <div id="categoryArea"></div>
</div>

<!-- 問題画面 -->
<div id="quizScreen" class="hidden">
  <div id="titleArea"></div>
  <div id="questionArea"></div>
  <div id="answersArea"></div>

  <button id="answerBtn">解答</button>
  <button id="explainBtn" class="hidden">解説を見る</button>

  <button id="nextBtnInQuiz" onclick="nextQuestion()">次の問題</button>
  <button id="topBtnInQuiz" class="hidden" onclick="goTop()">トップへ戻る</button>
</div>

<script>
let questions = [];
let filteredQuestions = [];
let currentIndex = 0;
let currentCategory = null;

let selectedAnswers = [];
let resultDivs = [];

function scrollToTop(){
  window.scrollTo({ top: 0, behavior: "instant" });
}

function normalizeText(str){
  if(!str) return "";
  return str.replace(/\\n/g, "\n");
}

fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    questions = data;
    loadCategories();
    restoreFromExplanation(); // ★ ここだけ
  });

function loadCategories(){
  const area = document.getElementById("categoryArea");
  area.innerHTML = "";
  const categories = [...new Set(questions.map(q => q.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = () => startQuiz(cat);
    area.appendChild(btn);
  });
}

/* ====== ここが重要 ====== */
function restoreFromExplanation(){
  const mode = localStorage.getItem("returnMode");
  if(!mode) return; // ★ なければ絶対トップ

  localStorage.removeItem("returnMode");

  const cat = localStorage.getItem("currentCategory");
  let idx = parseInt(localStorage.getItem("currentIndex") || "0", 10);

  if(!cat) return;

  currentCategory = cat;
  filteredQuestions = questions.filter(q => q.category === cat);

  if(mode === "next") idx++;
  if(idx >= filteredQuestions.length){
    goTop();
    return;
  }

  currentIndex = idx;

  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  scrollToTop();
  showQuestion();
}
/* ======================= */

function startQuiz(category){
  currentCategory = category;
  filteredQuestions = questions.filter(q => q.category === category);
  currentIndex = 0;

  localStorage.setItem("currentCategory", category);
  localStorage.setItem("currentIndex", "0");

  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");

  scrollToTop();
  showQuestion();
}

function goTop(){
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("topScreen").classList.remove("hidden");
  scrollToTop();
}

function showQuestion(){
  const q = filteredQuestions[currentIndex];
  if(!q) return;

  document.getElementById("titleArea").textContent =
    q.year + "年度" + (q.label ? " " + q.label : "");

  // orderMatters が false の場合、問題文の末尾に注記（任意）
  const note = (q.orderMatters === false) ? "\n\n※この問題は「順序不問」です。" : "";
  document.getElementById("questionArea").textContent =
    normalizeText(q.question) + note;

  const answersDiv = document.getElementById("answersArea");
  answersDiv.innerHTML = "";

  document.getElementById("answerBtn").classList.remove("hidden");
  document.getElementById("explainBtn").classList.add("hidden");

  selectedAnswers = new Array(q.answers.length).fill(null);
  resultDivs = [];

  q.answers.forEach((_, i) => {
    const block = document.createElement("div");
    block.className = "answer-block";

    const row = document.createElement("div");
    row.className = "answer-row";

    const label = document.createElement("label");
    label.textContent = "空欄" + (i + 1);
    row.appendChild(label);

    const select = document.createElement("select");
    select.innerHTML =
      "<option value=''>選択してください</option>" +
      q.choices.map((c, idx) => `<option value="${idx}">${c}</option>`).join("");

    select.onchange = () => {
      selectedAnswers[i] = select.value === "" ? null : Number(select.value);
    };

    row.appendChild(select);
    block.appendChild(row);

    const result = document.createElement("div");
    result.className = "answer-result";
    block.appendChild(result);

    resultDivs.push(result);
    answersDiv.appendChild(block);
  });

  document.getElementById("answerBtn").onclick = () => checkAnswer(q);
  document.getElementById("explainBtn").onclick = () => goExplanation(q);

  const isLast = currentIndex === filteredQuestions.length - 1;
  document.getElementById("nextBtnInQuiz").classList.toggle("hidden", isLast);
  document.getElementById("topBtnInQuiz").classList.toggle("hidden", !isLast);
}

/**
 * 順序不問の判定：
 * - 正誤は「選択された集合」と「正解集合」が一致するか（重複も考慮）
 * - 表示は各空欄について「あなたの選択が正解集合に入っているか」を、残数を減らしながら判定
 */
function checkAnswer(q){
  const orderMatters = (q.orderMatters !== false); // 未指定は true扱い
  const correct = q.answers.slice();

  // 未回答チェック（未回答があるなら、そのまま判定して表示）
  // ※ここは好みで「未回答があります」と出してreturnでもOK

  if(orderMatters){
    // 従来通り：位置固定で判定
    q.answers.forEach((c, i) => {
      if(selectedAnswers[i] === c){
        resultDivs[i].textContent = "⭕ 正解";
        resultDivs[i].className = "answer-result correct";
      }else{
        resultDivs[i].textContent = "❌ 正解：" + q.choices[c];
        resultDivs[i].className = "answer-result wrong";
      }
    });
  }else{
    // 1) 全体一致（マルチセット一致）チェック
    const sel = selectedAnswers.slice().filter(v => v !== null).sort((a,b)=>a-b);
    const cor = correct.slice().sort((a,b)=>a-b);
    const allAnswered = selectedAnswers.every(v => v !== null);

    const sameLength = sel.length === cor.length;
    let allMatch = sameLength;
    if(allMatch){
      for(let i=0;i<sel.length;i++){
        if(sel[i] !== cor[i]){
          allMatch = false;
          break;
        }
      }
    }

    // 2) 表示：各空欄ごとに「正解集合に存在するか」を残数方式で判定
    //    (同じ選択肢が複数回正解にある場合も正しく処理)
    const pool = correct.slice(); // 残っている正解
    selectedAnswers.forEach((ans, i) => {
      if(ans === null){
        resultDivs[i].textContent = "❌ 未選択";
        resultDivs[i].className = "answer-result wrong";
        return;
      }
      const idx = pool.indexOf(ans);
      if(idx !== -1){
        pool.splice(idx, 1);
        resultDivs[i].textContent = "⭕ 正解（順序不問）";
        resultDivs[i].className = "answer-result correct";
      }else{
        // 不正解時は「残っている正解」を参考表示（1つだけ見せる）
        const hint = (pool.length > 0) ? (" / 残り候補：" + pool.map(x=>q.choices[x]).join("、")) : "";
        resultDivs[i].textContent = "❌ 不正解" + hint;
        resultDivs[i].className = "answer-result wrong";
      }
    });

    // 3) 全体メッセージ（任意）：全部答えていて全体一致なら、全て正解の意味になる
    // （ここではUIを増やさず、各欄表示のみ）
  }

  document.getElementById("answerBtn").classList.add("hidden");
  document.getElementById("explainBtn").classList.remove("hidden");
}

function goExplanation(q){
  localStorage.setItem("currentCategory", currentCategory);
  localStorage.setItem("currentIndex", String(currentIndex));
  localStorage.setItem("returnMode", "back");

  const isLast = currentIndex === filteredQuestions.length - 1;

  localStorage.setItem("explanationData", JSON.stringify({
    year: q.year,
    label: q.label || "",
    explanation: q.explanation || "",
    isLast: isLast
  }));

  location.href = "explanation.html";
}

function nextQuestion(){
  currentIndex++;
  localStorage.setItem("currentIndex", String(currentIndex));
  scrollToTop();
  showQuestion();
}
</script>

</body>
</html>
