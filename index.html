<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:0;
  font-size:16px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* タイトル */
#title{
  padding:12px 15px;
  font-weight:bold;
  border-bottom:1px solid #ccc;
}

/* 解説本文（ここだけスクロール） */
#explanationWrapper{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

#explanation{
  white-space:pre-wrap;
  line-height:1.7;
}

/* フッター */
#footer{
  padding:10px 15px;
  border-top:1px solid #ccc;
  background:#fff;
}

/* ボタン共通 */
.footer-btn{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
  margin-bottom:8px;
}

/* 問題に戻る（薄い緑） */
#backBtn{
  background:#8fd19e;
  color:#000;
}

/* 次の問題（青） */
#nextBtn{
  background:#007bff;
  color:#fff;
}
</style>
</head>
<body>

<div id="title"></div>

<div id="explanationWrapper">
  <div id="explanation"></div>
</div>

<div id="footer">
  <button id="backBtn" class="footer-btn">問題に戻る</button>
  <button id="nextBtn" class="footer-btn">次の問題</button>
</div>

<script>
const dataStr = localStorage.getItem("explanationData");

if(!dataStr){
  document.getElementById("title").textContent = "解説";
  document.getElementById("explanation").textContent =
    "解説データがありません。\n\n問題ページから「解説を見る」を押してください。";
}else{
  const data = JSON.parse(dataStr);
  const labelText = data.label ? " " + data.label : "";
  document.getElementById("title").textContent =
    data.year + "年度" + labelText + " の解説";
  document.getElementById("explanation").textContent = data.explanation;
}

/* 問題に戻る */
document.getElementById("backBtn").onclick = () => {
  localStorage.removeItem("goNext");
  history.back();
};

/* 次の問題へ */
document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("goNext", "1");
  location.href = "index.html";
};
</script>

</body>
</html>
