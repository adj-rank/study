<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術アジャスター試験問題</title>

<style>
/* 全体 */
body{
  font-family: sans-serif;
  padding:15px;
  margin:0;
  font-size:16px;
}

/* 年度表示 */
#titleArea{
  font-size:16px;
  margin-bottom:8px;
}

/* 問題文だけスクロール（\n / \n\n 両対応） */
#questionArea{
  font-size:16px;
  line-height:1.7;
  white-space:pre-wrap;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:15px;
  max-height:40vh;
  overflow-y:auto;
}

/* 空欄ブロック */
.answer-block{
  margin-bottom:12px;
}

/* 空欄＋選択 同一行 */
.answer-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.answer-row label{
  min-width:60px;
}

/* 選択肢 */
select{
  flex:1;
  padding:10px;
  font-size:16px;
}

/* 正解表示（下） */
.answer-result{
  margin-left:60px;
  font-size:16px;
  line-height:1.6;
}

/* ボタン共通 */
button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
  color:#fff;
}

/* 解答ボタン（青） */
#answerBtn{
  background:#007bff;
}

/* ★ 解説ボタン（薄い緑） */
#explainBtn{
  background:#8fd19e;   /* 薄い緑 */
  color:#000;           /* 黒文字で読みやすく */
}

/* 次・トップボタン */
button.default{
  background:#6c757d;
}

button:active{ opacity:0.85; }

.correct{ color:green; font-weight:bold; }
.wrong{ color:red; font-weight:bold; }

.hidden{ display:none; }
</style>
</head>
<body>

<!-- トップ画面 -->
<div id="topScreen">
  <h3>技術アジャスター試験問題</h3>
  <div id="categoryArea"></div>
</div>

<!-- 問題画面 -->
<div id="quizScreen" class="hidden">
  <div id="titleArea"></div>
  <div id="questionArea"></div>

  <div id="answersArea"></div>

  <button id="answerBtn">解答</button>
  <button id="explainBtn" class="hidden">解説を見る</button>

  <button class="default" onclick="nextQuestion()">次の問題</button>
  <button class="default" onclick="goTop()">トップへ戻る</button>
</div>

<script>
let questions = [];
let filteredQuestions = [];
let currentIndex = 0;

let selectedAnswers = [];
let resultDivs = [];

/* questions.json 読み込み */
fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    questions = data;
    loadCategories();
  })
  .catch(err => {
    alert("questions.json の読み込みに失敗しました。");
  });

/* カテゴリ表示 */
function loadCategories(){
  const area = document.getElementById("categoryArea");
  area.innerHTML = "";
  const categories = [...new Set(questions.map(q => q.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.className = "default";
    btn.onclick = () => startQuiz(cat);
    area.appendChild(btn);
  });
}

/* 開始 */
function startQuiz(category){
  filteredQuestions = questions.filter(q => q.category === category);
  currentIndex = 0;
  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  showQuestion();
}

/* トップへ */
function goTop(){
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("topScreen").classList.remove("hidden");
}

/* 問題表示 */
function showQuestion(){
  const q = filteredQuestions[currentIndex];
  if(!q) return;

  document.getElementById("titleArea").textContent = q.year + "年度";
  document.getElementById("questionArea").textContent = q.question;

  const answersDiv = document.getElementById("answersArea");
  answersDiv.innerHTML = "";
  document.getElementById("explainBtn").classList.add("hidden");

  selectedAnswers = new Array(q.answers.length).fill(null);
  resultDivs = [];

  q.answers.forEach((_, i) => {
    const block = document.createElement("div");
    block.className = "answer-block";

    const row = document.createElement("div");
    row.className = "answer-row";

    const label = document.createElement("label");
    label.textContent = "空欄" + (i + 1);
    row.appendChild(label);

    const select = document.createElement("select");
    select.innerHTML =
      "<option value=''>選択してください</option>" +
      q.choices.map((c, idx) => `<option value="${idx}">${c}</option>`).join("");

    select.onchange = () => {
      const v = select.value;
      selectedAnswers[i] = (v === "") ? null : parseInt(v, 10);
    };

    row.appendChild(select);
    block.appendChild(row);

    const result = document.createElement("div");
    result.className = "answer-result";
    block.appendChild(result);

    resultDivs.push(result);
    answersDiv.appendChild(block);
  });

  document.getElementById("answerBtn").onclick = () => checkAnswer(q);
  document.getElementById("explainBtn").onclick = () => goExplanation(q);
}

/* 解答 */
function checkAnswer(q){
  q.answers.forEach((correct, i) => {
    if(selectedAnswers[i] === correct){
      resultDivs[i].textContent = "⭕ 正解";
      resultDivs[i].className = "answer-result correct";
    }else{
      resultDivs[i].textContent = "❌ 正解：" + q.choices[correct];
      resultDivs[i].className = "answer-result wrong";
    }
  });
  document.getElementById("explainBtn").classList.remove("hidden");
}

/* 解説ページへ */
function goExplanation(q){
  localStorage.setItem("explanationData", JSON.stringify({
    year: q.year,
    explanation: q.explanation
  }));
  location.href = "explanation.html";
}

/* 次の問題 */
function nextQuestion(){
  currentIndex++;
  if(currentIndex >= filteredQuestions.length) currentIndex = 0;
  showQuestion();
}
</script>

</body>
</html>
