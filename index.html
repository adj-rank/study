<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:15px;
  font-size:16px;
}

#title{
  font-size:16px;
  margin-bottom:10px;
}

#explanationArea{
  white-space:pre-wrap;
  line-height:1.7;
  border:1px solid #ccc;
  padding:10px;
  max-height:65vh;
  overflow-y:auto;
}

button{
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  border:none;
  border-radius:8px;
}

#backBtn{
  background:#8fd19e;
  color:#000;
}

#nextBtn{
  background:#007bff;
  color:#fff;
}
</style>
</head>

<body>

<div id="title"></div>
<div id="explanationArea"></div>

<button id="backBtn">問題に戻る</button>
<button id="nextBtn">次の問題</button>

<script>
const data = JSON.parse(localStorage.getItem("explanationData") || "{}");

document.getElementById("title").textContent =
  data.year + "年度" + (data.label ? " " + data.label : "");

document.getElementById("explanationArea").textContent =
  (data.explanation || "").replace(/\\n/g, "\n");

/* 問題に戻る（★ここが重要） */
document.getElementById("backBtn").onclick = () => {
  // 何もフラグを立てない
  location.href = "index.html";
};

/* 次の問題へ */
document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("goNext", "1");
  location.href = "index.html";
};
</script>

</body>
</html>
