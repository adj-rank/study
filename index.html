<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試験対策アプリ</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: auto;
  padding: 20px;
}
button {
  display: block;
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}
.correct { color: green; font-weight: bold; }
.incorrect { color: red; font-weight: bold; }
img { max-width: 100%; margin: 10px 0; }
.hidden { display: none; }
</style>
</head>

<body>

<h2 id="categoryTitle">カテゴリを選択してください</h2>
<div id="categorySelect"></div>

<div id="quizArea" class="hidden">
  <h3 id="questionText"></h3>
  <img id="questionImage" class="hidden">
  <div id="choices"></div>
  <p id="result"></p>
  <p id="explanation"></p>
  <button id="nextBtn" class="hidden">次の問題へ</button>
</div>

<script>
let questions = [

{ category: "自動車材料", type: "truefalse",
question: "鋼板は車体材料として多く使用されている。",
answer: true,
explanation: "正解。車体の多くは鋼板で構成されている。" },

{ category: "樹脂", type: "multiple",
question: "バンパーに多く使用される材料はどれか。",
choices: ["FRP","ポリプロピレン","鋳鉄","アルミ合金","銅"],
answer: 1,
explanation: "正解はポリプロピレン。軽量で衝撃吸収性に優れる。" },

{ category: "アライメント", type: "truefalse",
question: "トー角はタイヤの内外向きを示す角度である。",
answer: true,
explanation: "正解。トーイン・トーアウトで表す。" },

{ category: "運動特性", type: "multiple",
question: "アンダーステアの状態とはどれか。",
choices: ["前輪が外側に滑る","後輪が外側に滑る","全輪ロック","直進不能","ハンドルが重い"],
answer: 0,
explanation: "正解は前輪が外側に滑る状態。" },

{ category: "損傷特性", type: "truefalse",
question: "高張力鋼板は通常鋼板より伸びにくい。",
answer: true,
explanation: "正解。強度が高く加工特性が異なる。" },

{ category: "修理技法", type: "multiple",
question: "スタッド溶接機の主な用途はどれか。",
choices: ["塗装","引き出し作業","研磨","防錆","溶断"],
answer: 1,
explanation: "正解は引き出し作業。" },

{ category: "塗装関係", type: "truefalse",
question: "メタリック塗装はアルミ粉を含む塗料である。",
answer: true,
explanation: "正解。光の反射で金属感を出す。" },

{ category: "トラック", type: "multiple",
question: "大型トラックの後輪軸数が多い理由はどれか。",
choices: ["速度向上","積載荷重分散","燃費改善","旋回性能向上","騒音対策"],
answer: 1,
explanation: "正解は積載荷重分散。" }

];

let currentCategory = "";
let filteredQuestions = [];
let currentQuestionIndex = 0;

const categorySelect = document.getElementById("categorySelect");
const quizArea = document.getElementById("quizArea");
const questionText = document.getElementById("questionText");
const questionImage = document.getElementById("questionImage");
const choicesDiv = document.getElementById("choices");
const result = document.getElementById("result");
const explanation = document.getElementById("explanation");
const nextBtn = document.getElementById("nextBtn");
const categoryTitle = document.getElementById("categoryTitle");

function loadCategories() {
  let categories = [...new Set(questions.map(q => q.category))];
  categories.forEach(cat => {
    let btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = () => startQuiz(cat);
    categorySelect.appendChild(btn);
  });
}

function startQuiz(category) {
  currentCategory = category;
  filteredQuestions = questions.filter(q => q.category === category);
  currentQuestionIndex = 0;
  categorySelect.innerHTML = "";
  categoryTitle.textContent = category + " 問題";
  quizArea.classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  result.textContent = "";
  explanation.textContent = "";
  nextBtn.classList.add("hidden");
  choicesDiv.innerHTML = "";

  let q = filteredQuestions[currentQuestionIndex];
  questionText.textContent = q.question;

  if (q.image) {
    questionImage.src = q.image;
    questionImage.classList.remove("hidden");
  } else {
    questionImage.classList.add("hidden");
  }

  if (q.type === "truefalse") {
    ["○","×"].forEach((label, index) => {
      let btn = document.createElement("button");
      btn.textContent = label;
      btn.onclick = () => checkAnswer(index === 0);
      choicesDiv.appendChild(btn);
    });
  } else {
    q.choices.forEach((choice, index) => {
      let btn = document.createElement("button");
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(index);
      choicesDiv.appendChild(btn);
    });
  }
}

function checkAnswer(answer) {
  let q = filteredQuestions[currentQuestionIndex];
  if (answer === q.answer) {
    result.textContent = "正解！";
    result.className = "correct";
  } else {
    result.textContent = "不正解";
    result.className = "incorrect";
  }
  explanation.textContent = q.explanation;
  nextBtn.classList.remove("hidden");
}

nextBtn.onclick = () => {
  currentQuestionIndex++;
  if (currentQuestionIndex >= filteredQuestions.length) {
    alert("このカテゴリは終了しました");
    location.reload();
  } else {
    showQuestion();
  }
};

loadCategories();
</script>

</body>
</html>
