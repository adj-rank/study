<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>試験対策アプリ</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: auto;
  padding: 20px;
}
button {
  display: block;
  margin: 8px 0;
  padding: 12px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}
.correct { color: green; font-weight: bold; }
.incorrect { color: red; font-weight: bold; }
img { max-width: 100%; margin: 10px 0; }
.hidden { display: none; }
</style>
</head>

<body>

<h2 id="categoryTitle">カテゴリを選択してください</h2>
<div id="categorySelect"></div>

<div id="quizArea" class="hidden">
  <h3 id="questionText"></h3>
  <img id="questionImage" class="hidden">
  <div id="choices"></div>
  <p id="result"></p>
  <p id="explanation"></p>
  <button id="nextBtn" class="hidden">次の問題へ</button>
</div>

<script>
let questions = [];

fetch("questions.json")
  .then(response => response.json())
  .then(data => {
    questions = data;
    loadCategories();
  });

let currentCategory = "";
let filteredQuestions = [];
let currentQuestionIndex = 0;

const categorySelect = document.getElementById("categorySelect");
const quizArea = document.getElementById("quizArea");
const questionText = document.getElementById("questionText");
const questionImage = document.getElementById("questionImage");
const choicesDiv = document.getElementById("choices");
const result = document.getElementById("result");
const explanation = document.getElementById("explanation");
const nextBtn = document.getElementById("nextBtn");
const categoryTitle = document.getElementById("categoryTitle");

function loadCategories() {
  let categories = [...new Set(questions.map(q => q.category))];
  categories.forEach(cat => {
    let btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = () => startQuiz(cat);
    categorySelect.appendChild(btn);
  });
}

function startQuiz(category) {
  currentCategory = category;
  filteredQuestions = questions.filter(q => q.category === category);
  currentQuestionIndex = 0;
  categorySelect.innerHTML = "";
  categoryTitle.textContent = category + " 問題";
  quizArea.classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  result.textContent = "";
  explanation.textContent = "";
  nextBtn.classList.add("hidden");
  choicesDiv.innerHTML = "";

  let q = filteredQuestions[currentQuestionIndex];
  questionText.textContent = q.question;

  if (q.image) {
    questionImage.src = q.image;
    questionImage.classList.remove("hidden");
  } else {
    questionImage.classList.add("hidden");
  }

  if (q.type === "truefalse") {
    ["○","×"].forEach((label, index) => {
      let btn = document.createElement("button");
      btn.textContent = label;
      btn.onclick = () => checkAnswer(index === 0);
      choicesDiv.appendChild(btn);
    });
  } else {
    q.choices.forEach((choice, index) => {
      let btn = document.createElement("button");
      btn.textContent = choice;
      btn.onclick = () => checkAnswer(index);
      choicesDiv.appendChild(btn);
    });
  }
}

function checkAnswer(answer) {
  let q = filteredQuestions[currentQuestionIndex];
  if (answer === q.answer) {
    result.textContent = "正解！";
    result.className = "correct";
  } else {
    result.textContent = "不正解";
    result.className = "incorrect";
  }
  explanation.textContent = q.explanation;
  nextBtn.classList.remove("hidden");
}

nextBtn.onclick = () => {
  currentQuestionIndex++;
  if (currentQuestionIndex >= filteredQuestions.length) {
    alert("このカテゴリは終了しました");
    location.reload();
  } else {
    showQuestion();
  }
};

</script>

</body>
</html>
