<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>技術アジャスター試験問題</title>

<style>
body{
  font-family:sans-serif;
  padding:15px;
  margin:0;
  font-size:16px;
}

#questionArea{
  white-space:pre-wrap;
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:15px;
}

#imageArea{
  margin-bottom:15px;
}

#imageArea img{
  width:100%;
  height:auto;
  border:1px solid #ccc;
  border-radius:8px;
  margin:10px 0;
}

.answer-result{
  margin-top:5px;
}

.correct{color:green;font-weight:bold;}
.wrong{color:red;font-weight:bold;}
.hidden{display:none;}
</style>
</head>

<body>

<div id="questionArea"></div>
<div id="imageArea"></div>
<div id="answersArea"></div>

<button id="answerBtn">解答</button>
<button id="explainBtn" class="hidden">解説を見る</button>

<script>
let questions=[];
let currentIndex=0;
let selectedAnswers=[];
let resultDivs=[];

fetch("questions.json")
.then(res=>res.json())
.then(data=>{
  questions=data;
  showQuestion();
});

function showQuestion(){
  const q=questions[currentIndex];

  document.getElementById("questionArea").textContent=q.question;

  const imageArea=document.getElementById("imageArea");
  imageArea.innerHTML="";
  if(q.images){
    q.images.forEach(src=>{
      const img=document.createElement("img");
      img.src=src;
      img.loading="lazy";
      imageArea.appendChild(img);
    });
  }

  const answersDiv=document.getElementById("answersArea");
  answersDiv.innerHTML="";
  selectedAnswers=new Array(q.answers.length).fill(null);
  resultDivs=[];

  q.answers.forEach((_,i)=>{
    const select=document.createElement("select");
    select.innerHTML="<option value=''>選択</option>"+
      q.choices.map((c,idx)=>`<option value="${idx}">${c}</option>`).join("");
    select.onchange=()=>selectedAnswers[i]=Number(select.value);

    const result=document.createElement("div");
    resultDivs.push(result);

    answersDiv.appendChild(select);
    answersDiv.appendChild(result);
  });

  document.getElementById("answerBtn").onclick=()=>checkAnswer(q);
  document.getElementById("explainBtn").onclick=()=>goExplanation(q);
}

function checkAnswer(q){
  let remaining=q.answers.slice();
  const correctFlags=new Array(selectedAnswers.length).fill(false);

  selectedAnswers.forEach((ans,i)=>{
    const idx=remaining.indexOf(ans);
    if(idx!==-1){
      correctFlags[i]=true;
      remaining.splice(idx,1);
    }
  });

  const remainText=remaining.map(x=>q.choices[x]).join("、");

  selectedAnswers.forEach((_,i)=>{
    if(correctFlags[i]){
      resultDivs[i].textContent="⭕ 正解";
      resultDivs[i].className="correct";
    }else{
      resultDivs[i].textContent="❌ 正解："+remainText;
      resultDivs[i].className="wrong";
    }
  });

  document.getElementById("answerBtn").classList.add("hidden");
  document.getElementById("explainBtn").classList.remove("hidden");
}

function goExplanation(q){
  localStorage.setItem("explanationData",JSON.stringify(q));
  location.href="explanation.html";
}
</script>

</body>
</html>
