<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術アジャスター試験問題</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  margin: 0;
  font-size: 16px;
}

#titleArea {
  font-size: 16px;
  margin-bottom: 10px;
}

#questionArea {
  font-size: 17px;
  line-height: 1.7;
  margin-bottom: 15px;
  white-space: pre-wrap;
}

button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background-color: #007bff;
  color: white;
}

button.secondary {
  background-color: #6c757d;
}

select {
  width: 100%;
  padding: 8px;
  font-size: 14px;
  margin: 5px 0;
}

.correct { color: green; font-weight: bold; }
.wrong { color: red; font-weight: bold; }

.hidden { display: none; }
</style>
</head>
<body>

<!-- トップ画面 -->
<div id="topScreen">
  <h3>技術アジャスター試験問題</h3>
  <div id="categoryArea"></div>
</div>

<!-- 問題画面 -->
<div id="quizScreen" class="hidden">
  <div id="titleArea"></div>
  <div id="questionArea"></div>
  <div id="answersArea"></div>

  <button id="answerBtn">解答</button>
  <button id="explainBtn" class="secondary hidden">解説</button>

  <div id="explanationArea" class="hidden"></div>

  <button onclick="nextQuestion()">次の問題</button>
  <button onclick="goTop()">トップへ戻る</button>
</div>

<script>
let questions = [];
let filteredQuestions = [];
let currentIndex = 0;
let selectedAnswers = [];
let resultSpans = [];

fetch("questions.json")
  .then(res => res.json())
  .then(data => {
    questions = data;
    loadCategories();
  });

function loadCategories() {
  const area = document.getElementById("categoryArea");
  area.innerHTML = "";
  const categories = [...new Set(questions.map(q => q.category))];

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = () => startQuiz(cat);
    area.appendChild(btn);
  });
}

function startQuiz(category) {
  filteredQuestions = questions.filter(q => q.category === category);
  currentIndex = 0;
  document.getElementById("topScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  showQuestion();
}

function goTop() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("topScreen").classList.remove("hidden");
}

function showQuestion() {
  const q = filteredQuestions[currentIndex];

  document.getElementById("titleArea").textContent = q.year + "年度";
  document.getElementById("questionArea").textContent = q.question;

  const answersDiv = document.getElementById("answersArea");
  const explanationDiv = document.getElementById("explanationArea");
  answersDiv.innerHTML = "";
  explanationDiv.classList.add("hidden");
  explanationDiv.textContent = "";

  document.getElementById("explainBtn").classList.add("hidden");

  selectedAnswers = new Array(q.answers.length).fill(null);
  resultSpans = [];

  q.answers.forEach((_, index) => {
    const row = document.createElement("div");

    const label = document.createElement("div");
    label.textContent = "空欄" + (index + 1);
    row.appendChild(label);

    const select = document.createElement("select");
    select.innerHTML =
      "<option value=''>選択してください</option>" +
      q.choices.map((c, i) => `<option value="${i}">${c}</option>`).join("");
    select.onchange = () => {
      selectedAnswers[index] = parseInt(select.value);
    };
    row.appendChild(select);

    const resultSpan = document.createElement("div");
    row.appendChild(resultSpan);
    resultSpans.push(resultSpan);

    answersDiv.appendChild(row);
  });

  document.getElementById("answerBtn").onclick = () => checkAnswer(q);
  document.getElementById("explainBtn").onclick = () => showExplanation(q);
}

function checkAnswer(q) {
  q.answers.forEach((correct, i) => {
    if (selectedAnswers[i] === correct) {
      resultSpans[i].textContent = "⭕ 正解";
      resultSpans[i].className = "correct";
    } else {
      resultSpans[i].textContent = "❌ 正解: " + q.choices[correct];
      resultSpans[i].className = "wrong";
    }
  });
  document.getElementById("explainBtn").classList.remove("hidden");
}

function showExplanation(q) {
  const div = document.getElementById("explanationArea");
  div.textContent = q.explanation;
  div.classList.remove("hidden");
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= filteredQuestions.length) currentIndex = 0;
  showQuestion();
}
</script>

</body>
</html>
