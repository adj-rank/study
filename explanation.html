<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:sans-serif;
  font-size:16px;
  padding:15px;
}

#imageArea img{
  width:100%;
  height:auto;
  border:1px solid #ccc;
  border-radius:8px;
  margin:10px 0;
}

.hr{
  border-top:1px solid #666;
  margin:16px 0;
}
</style>
</head>

<body>

<div id="title"></div>
<div id="imageArea"></div>
<div id="explanationArea"></div>

<button onclick="history.back()">問題に戻る</button>

<script>
const data=JSON.parse(localStorage.getItem("explanationData")||"{}");

document.getElementById("title").textContent=
(data.year||"")+"年度 "+(data.label||"");

if(data.images){
  const imageArea=document.getElementById("imageArea");
  data.images.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    imageArea.appendChild(img);
  });
}

document.getElementById("explanationArea").textContent=
data.explanation||"";
</script>

</body>
</html>
