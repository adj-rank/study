<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:"MS Mincho", serif;
  font-size:16px;
  padding:15px;
  margin:0;
  overflow-x:hidden;              /* ★ ページ全体の横スクロール禁止 */
}

/* タイトル */
#title{
  font-size:16px;
  margin-bottom:10px;
}

/* 解説本文エリア */
#explanationArea{
  white-space:pre-wrap;
  line-height:1.7;
  border:1px solid #ccc;
  padding:10px;
  max-height:70vh;
  overflow-y:auto;
  overflow-x:hidden;              /* ★ 横方向は必ず隠す */
  margin-bottom:15px;
  box-sizing:border-box;          /* ★ padding込みで幅計算 */
}

/* 区切り線（完全スマホ対応） */
.hr{
  width:100%;                     /* ★ 親幅に合わせる */
  max-width:100%;
  border:none;
  border-top:1px solid #666;
  margin:16px 0;
  box-sizing:border-box;          /* ★ はみ出し防止 */
}

/* ボタン共通 */
button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

/* 問題に戻る（薄い緑） */
#backBtn{
  background:#8fd19e;
  color:#000;
}

/* 次の問題（青） */
#nextBtn{
  background:#007bff;
  color:#fff;
}

/* トップへ戻る（青） */
#topBtn{
  background:#007bff;
  color:#fff;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div id="title"></div>

<div id="explanationArea"></div>

<button id="backBtn">問題に戻る</button>
<button id="nextBtn">次の問題</button>
<button id="topBtn" class="hidden">トップへ戻る</button>

<script>
function normalizeText(str){
  if(!str) return "";

  return str
    .replace(/\\n/g, "\n")
    .replace(/\[\[SEPARATOR\]\]/g, "\n<hr class='hr'>\n");
}

const data =
  JSON.parse(localStorage.getItem("explanationData") || "{}");

document.getElementById("title").textContent =
  (data.year || "") + "年度 " + (data.label || "");

document.getElementById("explanationArea").innerHTML =
  normalizeText(data.explanation);

const isLast = data.isLast === true;

if(isLast){
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("topBtn").classList.remove("hidden");
}

document.getElementById("backBtn").onclick = () => {
  localStorage.setItem("returnMode", "back");
  location.href = "index.html";
};

document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("returnMode", "next");
  location.href = "index.html";
};

document.getElementById("topBtn").onclick = () => {
  localStorage.removeItem("returnMode");
  location.href = "index.html";
};
</script>

</body>
</html>
