<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:"MS Mincho", serif;
  font-size:16px;
  padding:15px;
  margin:0;
}

/* タイトル */
#title{
  font-size:16px;
  margin-bottom:10px;
}

/* 解説本文エリア */
#explanationArea{
  white-space:pre-wrap;
  line-height:1.7;
  border:1px solid #ccc;
  padding:10px;
  max-height:70vh;
  overflow-y:auto;
  margin-bottom:15px;
}

/* 自動幅の区切り線（スマホ対応） */
.hr{
  border:none;
  border-top:1px solid #666;
  margin:16px 0;
}

/* ボタン共通 */
button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

/* 問題に戻る（薄い緑） */
#backBtn{
  background:#8fd19e;
  color:#000;
}

/* 次の問題（青） */
#nextBtn{
  background:#007bff;
  color:#fff;
}

/* トップへ戻る（青） */
#topBtn{
  background:#007bff;
  color:#fff;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div id="title"></div>

<div id="explanationArea"></div>

<!-- 通常時 -->
<button id="backBtn">問題に戻る</button>
<button id="nextBtn">次の問題</button>

<!-- 最後の問題用 -->
<button id="topBtn" class="hidden">トップへ戻る</button>

<script>
/* JSONの \\n と 区切り線を変換 */
function normalizeText(str){
  if(!str) return "";

  return str
    .replace(/\\n/g, "\n")                     // 改行復元
    .replace(/\[\[SEPARATOR\]\]/g, "\n<hr class='hr'>\n");
}

/* 解説データ取得 */
const data =
  JSON.parse(localStorage.getItem("explanationData") || "{}");

/* タイトル表示 */
document.getElementById("title").textContent =
  (data.year || "") + "年度 " + (data.label || "");

/* 解説本文表示 */
document.getElementById("explanationArea").innerHTML =
  normalizeText(data.explanation);

/* 最後の問題かどうか（index.html から渡す） */
const isLast = data.isLast === true;

/* ボタン制御 */
if(isLast){
  // 最後 → トップへ戻るのみ
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("topBtn").classList.remove("hidden");
}else{
  document.getElementById("topBtn").classList.add("hidden");
}

/* 問題に戻る（同じ問題） */
document.getElementById("backBtn").onclick = () => {
  localStorage.setItem("returnMode", "back");
  location.href = "index.html";
};

/* 次の問題 */
document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("returnMode", "next");
  location.href = "index.html";
};

/* トップへ戻る */
document.getElementById("topBtn").onclick = () => {
  localStorage.removeItem("returnMode");
  location.href = "index.html";
};
</script>

</body>
</html>
