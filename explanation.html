<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:"MS Mincho", serif;
  font-size:16px;
  padding:15px;
  margin:0;
}

#title{
  font-size:16px;
  margin-bottom:10px;
}

#explanationArea{
  white-space:pre-wrap;
  line-height:1.7;
  border:1px solid #ccc;
  padding:10px;
  max-height:70vh;
  overflow-y:auto;
  margin-bottom:15px;
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

#backBtn{
  background:#8fd19e;   /* 薄い緑 */
  color:#000;
}

#nextBtn{
  background:#007bff;   /* 青 */
  color:#fff;
}

#topBtn{
  background:#007bff;   /* 青 */
  color:#fff;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div id="title"></div>

<div id="explanationArea"></div>

<!-- 通常時 -->
<button id="backBtn">問題に戻る</button>
<button id="nextBtn">次の問題</button>

<!-- 最後の問題用 -->
<button id="topBtn" class="hidden">トップへ戻る</button>

<script>
function normalizeText(str){
  if(!str) return "";
  return str.replace(/\\n/g, "\n");
}

/* 解説データ取得 */
const explanationData =
  JSON.parse(localStorage.getItem("explanationData") || "{}");

/* 現在位置 */
const currentIndex =
  parseInt(localStorage.getItem("currentIndex") || "0", 10);

/* 問題一覧（index.htmlで保持している想定） */
const questions =
  JSON.parse(localStorage.getItem("questionsCache") || "[]");

/* タイトル */
document.getElementById("title").textContent =
  (explanationData.year || "") + "年度 " + (explanationData.label || "");

/* 解説本文 */
document.getElementById("explanationArea").textContent =
  normalizeText(explanationData.explanation);

/* 最後の問題か判定 */
const isLast = questions.length > 0 && currentIndex === questions.length - 1;

/* ボタン制御 */
if(isLast){
  // 最後 → トップへ戻るだけ
  document.getElementById("backBtn").classList.add("hidden");
  document.getElementById("nextBtn").classList.add("hidden");
  document.getElementById("topBtn").classList.remove("hidden");
}else{
  // 通常
  document.getElementById("topBtn").classList.add("hidden");
}

/* 問題に戻る（同じ問題） */
document.getElementById("backBtn").onclick = () => {
  localStorage.setItem("returnMode", "back");
  location.href = "index.html";
};

/* 次の問題 */
document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("returnMode", "next");
  location.href = "index.html";
};

/* トップへ戻る */
document.getElementById("topBtn").onclick = () => {
  localStorage.removeItem("returnMode");
  location.href = "index.html";
};
</script>

</body>
</html>
