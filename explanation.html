<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>解説</title>

<style>
body{
  font-family:"MS Mincho", serif;
  font-size:16px;
  padding:15px;
  margin:0;
}

#title{
  font-size:16px;
  margin-bottom:10px;
}

#explanationArea{
  white-space:pre-wrap;
  line-height:1.7;
  border:1px solid #ccc;
  padding:10px;
  max-height:70vh;
  overflow-y:auto;
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

#backBtn{
  background:#8fd19e;
  color:#000;
}

#nextBtn{
  background:#007bff;
  color:#fff;
}

#topBtn{
  background:#8fd19e;
  color:#000;
}
</style>
</head>

<body>

<div id="title"></div>
<div id="explanationArea"></div>

<button id="backBtn">問題に戻る</button>
<button id="nextBtn">次の問題</button>
<button id="topBtn" class="hidden">トップへ戻る</button>

<script>
function normalizeText(str){
  if(!str) return "";
  return str.replace(/\\n/g, "\n");
}

const data = JSON.parse(localStorage.getItem("explanationData") || "{}");

document.getElementById("title").textContent =
  (data.year || "") + "年度 " + (data.label || "");

document.getElementById("explanationArea").textContent =
  normalizeText(data.explanation);

const currentIndex = parseInt(localStorage.getItem("currentIndex") || "0", 10);
const questions = JSON.parse(localStorage.getItem("questionsCache") || "[]");

document.getElementById("backBtn").onclick = () => {
  location.href = "index.html";
};

document.getElementById("nextBtn").onclick = () => {
  localStorage.setItem("currentIndex", String(currentIndex + 1));
  location.href = "index.html";
};
</script>

</body>
</html>
