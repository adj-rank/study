<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025年度の解説</title>

<style>
/* 全体 */
body{
  font-family: sans-serif;   /* 問題ページと同じ */
  margin:0;
  padding:0;
  font-size:16px;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* タイトル */
#title{
  padding:12px 15px;
  font-weight:bold;
  border-bottom:1px solid #ccc;
}

/* ★ 解説本文：ここだけスクロール */
#explanationWrapper{
  flex:1;                    /* 残り領域をすべて使う */
  overflow-y:auto;           /* 縦スクロール */
  padding:15px;
}

/* 解説本文 */
#explanation{
  white-space:pre-wrap;      /* \n と \n\n 両対応 */
  line-height:1.7;
}

/* 下部固定ボタン */
#footer{
  padding:10px 15px;
  border-top:1px solid #ccc;
  background:#fff;
}

button{
  width:100%;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:none;
}
</style>
</head>
<body>

<!-- タイトル -->
<div id="title"></div>

<!-- ★ スクロールする解説本文 -->
<div id="explanationWrapper">
  <div id="explanation"></div>
</div>

<!-- 下部固定 -->
<div id="footer">
  <button onclick="history.back()">問題に戻る</button>
</div>

<script>
const dataStr = localStorage.getItem("explanationData");

if(!dataStr){
  document.getElementById("title").textContent = "解説";
  document.getElementById("explanation").textContent =
    "解説データがありません。\n\n必ず問題ページから「解説を見る」を押してください。";
}else{
  const data = JSON.parse(dataStr);
  document.getElementById("title").textContent = data.year + "年度の解説";
  document.getElementById("explanation").textContent = data.explanation;
}
</script>

</body>
</html>
